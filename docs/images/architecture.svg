<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="sans-serif">

  <!-- Background -->
  <rect width="1200" height="780" fill="#f4f6f9"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a7ab5"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a7ab5"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#78a860"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9878c8"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d4905a"/>
    </marker>
    <marker id="arrow-brown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b89070"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a0b0c8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a2744">Hermes Corp Platform - Architecture</text>
  <line x1="60" y1="48" x2="1140" y2="48" stroke="#c0c8d8" stroke-width="1"/>

  <!-- Self-hosted server frame -->
  <rect x="50" y="58" width="1100" height="690" rx="14" ry="14"
        fill="none" stroke="#7a9cc4" stroke-width="2" stroke-dasharray="10,5"/>
  <rect x="60" y="54" width="210" height="24" rx="5" fill="#7a9cc4"/>
  <text x="165" y="70" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">Your Server (self-hosted)</text>

  <!-- User icon -->
  <circle cx="160" cy="75" r="14" fill="#e8edf5" stroke="#7a9cc4" stroke-width="1.5"/>
  <text x="160" y="80" text-anchor="middle" font-size="13" fill="#2c4a7c">U</text>
  <text x="160" y="94" text-anchor="middle" font-size="11" fill="#5a6a82">User</text>

  <!-- OpenWebUI box -->
  <rect x="80" y="104" width="160" height="60" rx="8" fill="#2c4a7c"/>
  <text x="160" y="130" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">OpenWebUI</text>
  <text x="160" y="149" text-anchor="middle" font-size="11" fill="#a8c4e8">port 8085</text>

  <!-- Telegram box -->
  <rect x="80" y="204" width="160" height="60" rx="8" fill="#2c4a7c"/>
  <text x="160" y="229" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">Telegram Gateway</text>
  <text x="160" y="248" text-anchor="middle" font-size="11" fill="#a8c4e8">webhook / MUX</text>

  <!-- Arrow: user -> OpenWebUI -->
  <line x1="160" y1="89" x2="160" y2="104" stroke="#7a9cc4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow: user -> Telegram -->
  <polyline points="145,89 145,95 80,95 80,204" fill="none" stroke="#7a9cc4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- identity-proxy -->
  <rect x="310" y="140" width="180" height="72" rx="8" fill="#1a3a6b"/>
  <text x="400" y="167" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">identity-proxy</text>
  <text x="400" y="185" text-anchor="middle" font-size="11" fill="#a8c4e8">port 8643</text>
  <text x="400" y="202" text-anchor="middle" font-size="10" fill="#7ca8d4">resolve . route . security</text>

  <!-- Arrow: OpenWebUI -> identity-proxy -->
  <line x1="240" y1="134" x2="310" y2="165" stroke="#4a7ab5" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Arrow: Telegram -> identity-proxy -->
  <line x1="240" y1="234" x2="310" y2="188" stroke="#4a7ab5" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- provisioner -->
  <rect x="310" y="264" width="180" height="62" rx="8" fill="#1a3a6b"/>
  <text x="400" y="290" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">provisioner</text>
  <text x="400" y="308" text-anchor="middle" font-size="11" fill="#a8c4e8">port 8650</text>
  <text x="400" y="320" text-anchor="middle" font-size="10" fill="#7ca8d4">per-user containers</text>

  <!-- Arrow: proxy -> provisioner (dashed) -->
  <line x1="400" y1="212" x2="400" y2="264" stroke="#4a7ab5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>

  <!-- runtime: alice -->
  <rect x="560" y="100" width="180" height="72" rx="8" fill="#1e5c3a"/>
  <text x="650" y="128" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">runtime: alice</text>
  <text x="650" y="147" text-anchor="middle" font-size="11" fill="#a8d8b8">hermes-u-alice  :8642</text>
  <text x="650" y="163" text-anchor="middle" font-size="10" fill="#78c898">isolated memory + config</text>

  <!-- runtime: bob -->
  <rect x="560" y="204" width="180" height="72" rx="8" fill="#1e5c3a"/>
  <text x="650" y="232" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">runtime: bob</text>
  <text x="650" y="251" text-anchor="middle" font-size="11" fill="#a8d8b8">hermes-u-bob  :8642</text>
  <text x="650" y="267" text-anchor="middle" font-size="10" fill="#78c898">isolated memory + config</text>

  <!-- runtime: carol -->
  <rect x="560" y="308" width="180" height="72" rx="8" fill="#1e5c3a"/>
  <text x="650" y="336" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">runtime: carol</text>
  <text x="650" y="355" text-anchor="middle" font-size="11" fill="#a8d8b8">hermes-u-carol  :8642</text>
  <text x="650" y="371" text-anchor="middle" font-size="10" fill="#78c898">isolated memory + config</text>

  <!-- Arrows: proxy -> runtimes -->
  <line x1="490" y1="162" x2="560" y2="136" stroke="#4a7ab5" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="490" y1="172" x2="560" y2="240" stroke="#4a7ab5" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="490" y1="178" x2="560" y2="344" stroke="#4a7ab5" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Arrow: provisioner -> runtime carol (creates, dashed green) -->
  <line x1="490" y1="290" x2="560" y2="338" stroke="#78a860" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- Brokers block -->
  <rect x="830" y="82" width="290" height="240" rx="10" fill="#f0f4fa" stroke="#7a9cc4" stroke-width="1.5"/>
  <rect x="840" y="78" width="200" height="22" rx="5" fill="#7a9cc4"/>
  <text x="940" y="93" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Brokers - replaceable stubs</text>

  <!-- corp-dir-broker -->
  <rect x="848" y="108" width="254" height="52" rx="7" fill="#3a5a8c"/>
  <text x="975" y="131" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">corp-dir-broker</text>
  <text x="975" y="150" text-anchor="middle" font-size="10" fill="#a8c4e8">port 8652  -  employee directory</text>

  <!-- files-broker -->
  <rect x="848" y="172" width="254" height="52" rx="7" fill="#3a5a8c"/>
  <text x="975" y="195" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">files-broker</text>
  <text x="975" y="214" text-anchor="middle" font-size="10" fill="#a8c4e8">port 8651  -  cloud / files</text>

  <!-- tasks-broker -->
  <rect x="848" y="236" width="254" height="52" rx="7" fill="#3a5a8c"/>
  <text x="975" y="259" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">tasks-broker</text>
  <text x="975" y="278" text-anchor="middle" font-size="10" fill="#a8c4e8">port 8654  -  task tracker</text>

  <!-- Arrows: runtimes -> brokers -->
  <line x1="740" y1="130" x2="848" y2="134" stroke="#78a860" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <line x1="740" y1="242" x2="848" y2="198" stroke="#78a860" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <line x1="740" y1="350" x2="848" y2="262" stroke="#78a860" stroke-width="1.6" marker-end="url(#arrow-green)"/>

  <!-- Corp systems external -->
  <rect x="848" y="350" width="254" height="52" rx="7" fill="#e8edf5" stroke="#a0b0c8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="975" y="373" text-anchor="middle" font-size="12" fill="#4a5a72" font-weight="bold">Your Corp Systems</text>
  <text x="975" y="391" text-anchor="middle" font-size="10" fill="#7a8a9a">LDAP / Drive / Tracker / ...</text>
  <!-- Arrow: brokers -> corp systems -->
  <line x1="975" y1="288" x2="975" y2="350" stroke="#a0b0c8" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>

  <!-- memory block -->
  <rect x="560" y="440" width="180" height="100" rx="8" fill="#4a2c6b"/>
  <text x="650" y="466" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">memory</text>
  <text x="650" y="484" text-anchor="middle" font-size="10" fill="#c8a8e8">personal bank (read-write)</text>
  <text x="650" y="500" text-anchor="middle" font-size="10" fill="#c8a8e8">corp bank (read-only)</text>
  <text x="650" y="516" text-anchor="middle" font-size="10" fill="#9878c8">Hindsight-compatible</text>
  <text x="650" y="532" text-anchor="middle" font-size="10" fill="#9878c8">isolated per user</text>

  <!-- Arrows: runtimes -> memory -->
  <line x1="650" y1="380" x2="650" y2="440" stroke="#9878c8" stroke-width="1.6" marker-end="url(#arrow-purple)"/>

  <!-- llm-gateway -->
  <rect x="830" y="440" width="180" height="70" rx="8" fill="#7c3a1a"/>
  <text x="920" y="467" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">llm-gateway</text>
  <text x="920" y="485" text-anchor="middle" font-size="11" fill="#e8b898">port 4000</text>
  <text x="920" y="501" text-anchor="middle" font-size="10" fill="#d4905a">LiteLLM / your provider</text>

  <!-- Arrows: runtimes -> llm-gateway -->
  <line x1="740" y1="136" x2="830" y2="458" stroke="#d4905a" stroke-width="1.3" marker-end="url(#arrow-orange)"/>
  <line x1="740" y1="244" x2="830" y2="464" stroke="#d4905a" stroke-width="1.3" marker-end="url(#arrow-orange)"/>
  <line x1="740" y1="350" x2="830" y2="470" stroke="#d4905a" stroke-width="1.3" marker-end="url(#arrow-orange)"/>

  <!-- key-broker -->
  <rect x="830" y="544" width="180" height="62" rx="8" fill="#5a3a1a"/>
  <text x="920" y="568" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">key-broker</text>
  <text x="920" y="586" text-anchor="middle" font-size="10" fill="#d4b090">per-user LLM key isolation</text>
  <text x="920" y="600" text-anchor="middle" font-size="10" fill="#b89070">Bearer system-secret</text>

  <!-- Arrow: llm-gateway -> key-broker -->
  <line x1="920" y1="510" x2="920" y2="544" stroke="#b89070" stroke-width="1.4" marker-end="url(#arrow-brown)"/>

  <!-- hermes-agent admin -->
  <rect x="310" y="430" width="180" height="62" rx="8" fill="#2c4a2c"/>
  <text x="400" y="454" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">hermes-agent (admin)</text>
  <text x="400" y="472" text-anchor="middle" font-size="11" fill="#a8d8a8">port 8642</text>
  <text x="400" y="485" text-anchor="middle" font-size="10" fill="#78b878">base template for runtimes</text>

  <!-- Arrow: admin agent -> runtimes (template, dashed) -->
  <line x1="490" y1="454" x2="560" y2="362" stroke="#78b878" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- Legend -->
  <rect x="80" y="668" width="1060" height="68" rx="8" fill="#e8edf5" stroke="#c0c8d8" stroke-width="1"/>
  <text x="105" y="684" font-size="12" fill="#2c4a7c" font-weight="bold">Legend</text>

  <line x1="90" y1="702" x2="134" y2="702" stroke="#4a7ab5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="142" y="706" font-size="11" fill="#3a4a5a">Request / response flow</text>

  <line x1="300" y1="702" x2="344" y2="702" stroke="#4a7ab5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="352" y="706" font-size="11" fill="#3a4a5a">Control / provisioning</text>

  <line x1="510" y1="702" x2="554" y2="702" stroke="#78a860" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="562" y="706" font-size="11" fill="#3a4a5a">Runtime to Broker</text>

  <line x1="700" y1="702" x2="744" y2="702" stroke="#9878c8" stroke-width="1.6" marker-end="url(#arrow-purple)"/>
  <text x="752" y="706" font-size="11" fill="#3a4a5a">Memory access</text>

  <line x1="870" y1="702" x2="914" y2="702" stroke="#d4905a" stroke-width="1.4" marker-end="url(#arrow-orange)"/>
  <text x="922" y="706" font-size="11" fill="#3a4a5a">LLM request</text>

  <rect x="1050" y="695" width="20" height="12" rx="2" fill="#e8edf5" stroke="#a0b0c8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="1078" y="706" font-size="11" fill="#3a4a5a">External</text>

</svg>
