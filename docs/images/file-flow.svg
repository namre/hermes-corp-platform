<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="sans-serif">

  <!-- Background -->
  <rect width="1100" height="560" fill="#f4f6f9"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowB" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#2c7ab5"/>
    </marker>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#1e7a4a"/>
    </marker>
    <marker id="arrowO" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#c07820"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a2744">Hermes Corp Platform - File Flow</text>
  <line x1="40" y1="46" x2="1060" y2="46" stroke="#c0c8d8" stroke-width="1"/>

  <!-- ===== LANE: UPLOAD (INLET) ===== -->
  <!-- Lane background -->
  <rect x="30" y="60" width="1040" height="210" rx="10" fill="#eaf2fb" stroke="#7ab0d8" stroke-width="1.5"/>
  <!-- Lane label -->
  <rect x="30" y="60" width="100" height="210" rx="10" fill="#2c7ab5"/>
  <text x="80" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff"
        transform="rotate(-90, 80, 155)">UPLOAD</text>
  <text x="80" y="178" text-anchor="middle" font-size="10" fill="#a8d0f0"
        transform="rotate(-90, 80, 178)">(INLET)</text>

  <!-- Step 1: User attaches file in OpenWebUI -->
  <rect x="148" y="90" width="160" height="70" rx="8" fill="#2c4a7c"/>
  <text x="228" y="116" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">User (OpenWebUI)</text>
  <text x="228" y="134" text-anchor="middle" font-size="10" fill="#a8c4e8">attaches file</text>
  <text x="228" y="150" text-anchor="middle" font-size="10" fill="#a8c4e8">to chat message</text>

  <!-- Step 2: File Router filter (inlet) -->
  <rect x="358" y="90" width="160" height="70" rx="8" fill="#1a4a7c"/>
  <text x="438" y="116" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">File Router</text>
  <text x="438" y="134" text-anchor="middle" font-size="11" fill="#a8c4e8">(filter: inlet)</text>
  <text x="438" y="152" text-anchor="middle" font-size="10" fill="#7ca8d4">reads binary from</text>
  <!-- Step 2b sub-label -->
  <text x="438" y="166" text-anchor="middle" font-size="10" fill="#7ca8d4">OpenWebUI store</text>

  <!-- Step 3: identity-proxy /v1/files -->
  <rect x="568" y="90" width="170" height="70" rx="8" fill="#1a3a6b"/>
  <text x="653" y="113" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">identity-proxy</text>
  <text x="653" y="131" text-anchor="middle" font-size="11" fill="#a8c4e8">POST /v1/files</text>
  <text x="653" y="149" text-anchor="middle" font-size="10" fill="#7ca8d4">multipart + user email</text>
  <text x="653" y="163" text-anchor="middle" font-size="10" fill="#7ca8d4">port 8643</text>

  <!-- Step 4: runtime data volume -->
  <rect x="790" y="90" width="230" height="70" rx="8" fill="#1e5c3a"/>
  <text x="905" y="113" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">runtime: alice</text>
  <text x="905" y="131" text-anchor="middle" font-size="11" fill="#a8d8b8">data volume</text>
  <text x="905" y="149" text-anchor="middle" font-size="10" fill="#78c898">/opt/data/  (isolated per user)</text>
  <text x="905" y="163" text-anchor="middle" font-size="10" fill="#78c898">agent sees and processes file</text>

  <!-- Arrows: upload lane -->
  <line x1="308" y1="125" x2="358" y2="125" stroke="#2c7ab5" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="518" y1="125" x2="568" y2="125" stroke="#2c7ab5" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="738" y1="125" x2="790" y2="125" stroke="#2c7ab5" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Labels on arrows (upload) -->
  <rect x="316" y="109" width="34" height="14" rx="3" fill="#ddeefa"/>
  <text x="333" y="120" text-anchor="middle" font-size="9" fill="#2c4a7c">POST</text>
  <rect x="526" y="109" width="34" height="14" rx="3" fill="#ddeefa"/>
  <text x="543" y="120" text-anchor="middle" font-size="9" fill="#2c4a7c">POST</text>
  <rect x="748" y="109" width="34" height="14" rx="3" fill="#ddeefa"/>
  <text x="765" y="120" text-anchor="middle" font-size="9" fill="#2c4a7c">PUT</text>

  <!-- Upload flow annotation -->
  <text x="148" y="200" font-size="11" fill="#3a6a9a">1. User drops file into chat</text>
  <text x="358" y="200" font-size="11" fill="#3a6a9a">2. Filter intercepts</text>
  <text x="568" y="200" font-size="11" fill="#3a6a9a">3. proxy routes to user</text>
  <text x="790" y="200" font-size="11" fill="#3a6a9a">4. File lands in private volume</text>
  <text x="148" y="216" font-size="11" fill="#3a6a9a">   in OpenWebUI</text>
  <text x="358" y="216" font-size="11" fill="#3a6a9a">   + forwards binary</text>
  <text x="568" y="216" font-size="11" fill="#3a6a9a">   runtime by email</text>
  <text x="790" y="216" font-size="11" fill="#3a6a9a">   isolated from others</text>

  <!-- ===== LANE: DOWNLOAD (OUTLET) ===== -->
  <rect x="30" y="290" width="1040" height="220" rx="10" fill="#edf7f0" stroke="#78c898" stroke-width="1.5"/>
  <!-- Lane label -->
  <rect x="30" y="290" width="100" height="220" rx="10" fill="#1e6a3a"/>
  <text x="80" y="392" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff"
        transform="rotate(-90, 80, 392)">DOWNLOAD</text>
  <text x="80" y="416" text-anchor="middle" font-size="10" fill="#a8e8b8"
        transform="rotate(-90, 80, 416)">(OUTLET)</text>

  <!-- Step A: runtime creates file -->
  <rect x="148" y="320" width="220" height="80" rx="8" fill="#1e5c3a"/>
  <text x="258" y="347" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">runtime: alice</text>
  <text x="258" y="365" text-anchor="middle" font-size="11" fill="#a8d8b8">agent creates file</text>
  <text x="258" y="382" text-anchor="middle" font-size="10" fill="#78c898">/opt/data/report.xlsx</text>
  <text x="258" y="396" text-anchor="middle" font-size="10" fill="#78c898">responds with local path</text>

  <!-- Step B: File Router (outlet) detects path -->
  <rect x="418" y="320" width="200" height="80" rx="8" fill="#1a6a3a"/>
  <text x="518" y="347" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">File Router</text>
  <text x="518" y="365" text-anchor="middle" font-size="11" fill="#a8e8b8">(filter: outlet)</text>
  <text x="518" y="381" text-anchor="middle" font-size="10" fill="#78c898">scans response for</text>
  <text x="518" y="395" text-anchor="middle" font-size="10" fill="#78c898">/opt/data/... paths</text>

  <!-- Step C: proxy register-existing -->
  <rect x="668" y="320" width="195" height="80" rx="8" fill="#1a3a6b"/>
  <text x="765" y="345" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">identity-proxy</text>
  <text x="765" y="363" text-anchor="middle" font-size="11" fill="#a8c4e8">POST /v1/files/</text>
  <text x="765" y="379" text-anchor="middle" font-size="11" fill="#a8c4e8">  register-existing</text>
  <text x="765" y="395" text-anchor="middle" font-size="10" fill="#7ca8d4">returns file_id + download_url</text>

  <!-- Step D: user gets download link -->
  <rect x="913" y="320" width="145" height="80" rx="8" fill="#2c4a7c"/>
  <text x="985" y="347" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">User</text>
  <text x="985" y="365" text-anchor="middle" font-size="11" fill="#a8c4e8">sees clickable link</text>
  <text x="985" y="381" text-anchor="middle" font-size="10" fill="#7ca8d4">[report.xlsx]</text>
  <text x="985" y="397" text-anchor="middle" font-size="10" fill="#7ca8d4">GET /v1/files/{id}</text>

  <!-- Arrows: download lane -->
  <line x1="368" y1="360" x2="418" y2="360" stroke="#1e7a4a" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="618" y1="360" x2="668" y2="360" stroke="#1e7a4a" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="863" y1="360" x2="913" y2="360" stroke="#1e7a4a" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Labels on arrows (download) -->
  <rect x="376" y="344" width="34" height="14" rx="3" fill="#d4f0de"/>
  <text x="393" y="355" text-anchor="middle" font-size="9" fill="#1e6a38">path</text>
  <rect x="626" y="344" width="34" height="14" rx="3" fill="#d4f0de"/>
  <text x="643" y="355" text-anchor="middle" font-size="9" fill="#1e6a38">POST</text>
  <rect x="868" y="344" width="38" height="14" rx="3" fill="#d4f0de"/>
  <text x="887" y="355" text-anchor="middle" font-size="9" fill="#1e6a38">URL</text>

  <!-- Download flow annotations -->
  <text x="148" y="420" font-size="11" fill="#2a5a3a">1. Agent generates report,</text>
  <text x="148" y="436" font-size="11" fill="#2a5a3a">   replies with local path</text>
  <text x="418" y="420" font-size="11" fill="#2a5a3a">2. Outlet filter detects</text>
  <text x="418" y="436" font-size="11" fill="#2a5a3a">   /opt/data/... in response</text>
  <text x="668" y="420" font-size="11" fill="#2a5a3a">3. proxy registers file,</text>
  <text x="668" y="436" font-size="11" fill="#2a5a3a">   issues download_url</text>
  <text x="913" y="420" font-size="11" fill="#2a5a3a">4. Path replaced by</text>
  <text x="913" y="436" font-size="11" fill="#2a5a3a">   clickable download link</text>
  <text x="668" y="452" font-size="11" fill="#2a5a3a">   GET /v1/files/{id}/content</text>

  <!-- Bottom note -->
  <text x="550" y="530" text-anchor="middle" font-size="11" fill="#7a8a9a">
    Files are isolated per-user runtime. No cross-user file access. Paths shown (/opt/data/) are illustrative.
  </text>

</svg>
